version: '3.8'

volumes:
  postgres-data:
  kestra-data:

services:
  # Database to store Kestra's internal state
  postgres:
    image: postgres:16
    container_name: kestra-postgres
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: kestra_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d kestra -U kestra"]
      interval: 5s
      timeout: 5s
      retries: 5

  # The Kestra Orchestration Server
  kestra:
    image: kestra/kestra:latest
    container_name: kestra-server
    user: "root"
    command: server standalone
    volumes:
      - kestra-data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock  
      - ./flows:/app/flows                        
      - ./scripts:/scripts                    
      - ./data:/data                           
    environment:
      KESTRA_CONFIGURATION: |
        kestra:
          storage:
            type: local
            local:
              base-path: /app/storage
          queue:
            type: postgres
          repository:
            type: postgres
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: kestra_password
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy